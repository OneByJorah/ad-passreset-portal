name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: src/PassReset.Web/ClientApp/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore src/PassReset.sln

      - name: Validate appsettings.Production.template.json against schema
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $errors = @()
          try {
            $valid = Test-Json `
              -Path 'src/PassReset.Web/appsettings.Production.template.json' `
              -SchemaFile 'src/PassReset.Web/appsettings.schema.json' `
              -ErrorVariable errors `
              -ErrorAction SilentlyContinue
          } catch {
            $valid = $false
            $errors = @($_.Exception.Message)
          }
          if (-not $valid) {
            Write-Host '::error::Schema validation failed for appsettings.Production.template.json'
            foreach ($e in $errors) { Write-Host "::error::$e" }
            exit 1
          }
          Write-Host 'Schema validation passed.'

      - name: Schema-drift gate (schema covers every appsettings.json section)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Module -ListAvailable Pester | Where-Object { $_.Version -ge [version]'5.0.0' })) {
            Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          }
          $r = Invoke-Pester -Path deploy/schema-coverage.tests.ps1 -PassThru -Output Detailed
          if ($r.FailedCount -gt 0) {
            Write-Host "::error::appsettings.schema.json is missing sections present in appsettings.json (STAB-008 drift gate). $($r.FailedCount) check(s) failed."
            exit 1
          }
          Write-Host 'Schema-drift gate passed: schema covers all config sections.'

      - name: Installer Pester tests (config sync — STAB-010/011)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Module -ListAvailable Pester | Where-Object { $_.Version -ge [version]'5.0.0' })) {
            Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          }
          $r = Invoke-Pester -Path deploy/Install-PassReset.Tests.ps1 -PassThru -Output Detailed
          if ($r.FailedCount -gt 0) {
            Write-Host "::error::Installer Pester suite failed ($($r.FailedCount) test(s))."
            exit 1
          }
          Write-Host "Installer Pester suite passed ($($r.PassedCount) tests)."

      - name: Build solution
        run: dotnet build src/PassReset.sln --no-restore --configuration Release

      - name: Install npm dependencies
        working-directory: src/PassReset.Web/ClientApp
        run: npm ci

      - name: Build frontend
        working-directory: src/PassReset.Web/ClientApp
        run: npm run build

  tests:
    needs: build
    uses: ./.github/workflows/tests.yml
    # Pass secrets to the reusable workflow. Required by the Phase 11
    # integration-tests-ldap job (SAMBA_DOMAIN_PASSWORD,
    # SAMBA_TEST_OLD_PASSWORD, SAMBA_TEST_NEW_PASSWORD). Without this,
    # `secrets.X` evaluates to empty strings inside tests.yml.
    secrets: inherit
